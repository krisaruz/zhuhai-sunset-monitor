name: Daily Sunset Forecast Scraper

on:
  schedule:
    # 每小时运行一次 (UTC时间每小时的第 5 分钟)
    - cron: '5 * * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Runtime Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx ephem pydantic-settings sqlalchemy aiosqlite

      - name: Run Scraper
        env:
          SUNSET_FEISHU_WEBHOOK_URL: ${{ secrets.SUNSET_FEISHU_WEBHOOK_URL }}
          SUNSET_FEISHU_WEBHOOK_SECRET: ${{ secrets.SUNSET_FEISHU_WEBHOOK_SECRET }}
          # You can also customize default city or threshold here if needed
          SUNSET_NOTIFY_MIN_QUALITY: 0.2
        run: python run.py

      - name: Sync data to docs for GitHub Pages
        run: cp data/history.json data/map-data.json docs/data/

      - name: Commit and Push Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/map-data.json data/history.json docs/data/
          # Commit only if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "data: update sunset forecast and history"
            git push origin master
          else
            echo "No changes in forecast or history data. Skipping commit."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
