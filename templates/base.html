<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}珠海晚霞监控{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-amber-400">珠海晚霞监控</h1>
            <div class="flex gap-4 text-sm">
                <a href="/" class="hover:text-amber-400 transition">Dashboard</a>
                <a href="/api/history/best?top_n=10" target="_blank" class="hover:text-amber-400 transition">最佳记录</a>
                <a href="/api/locations" target="_blank" class="hover:text-amber-400 transition">拍摄点</a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
